<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>FearLess Biofeedback | Real Buzzer Sound & Haptic</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: linear-gradient(145deg, #10141c 0%, #0b0f17 100%);
            font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, 'Poppins', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .device {
            max-width: 520px;
            width: 100%;
            background: rgba(18, 25, 40, 0.8);
            backdrop-filter: blur(2px);
            border-radius: 72px;
            padding: 20px 18px 32px;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.5), inset 0 1px 1px rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(90, 150, 220, 0.3);
        }

        .lcd {
            background: #0a2f2a;
            background: linear-gradient(145deg, #0b3b35, #06221f);
            border-radius: 32px;
            padding: 20px 16px;
            margin-bottom: 28px;
            box-shadow: inset 0 0 12px rgba(0,0,0,0.6), 0 6px 10px rgba(0,0,0,0.3);
            border: 1px solid #2e7d6e;
            font-family: 'Fira Mono', 'Courier New', monospace;
        }

        .lcd-row {
            text-align: center;
            font-weight: 600;
            letter-spacing: 1px;
        }

        .lcd-main {
            font-size: 1.9rem;
            color: #c3ffd8;
            text-shadow: 0 0 3px #1effbc;
            background: #02100e;
            padding: 12px 8px;
            border-radius: 20px;
            margin-bottom: 12px;
            word-break: break-word;
        }

        .lcd-sub {
            font-size: 1rem;
            color: #9fd3c7;
            background: #02100e70;
            padding: 8px;
            border-radius: 28px;
        }

        .bpm-badge {
            background: #02100e;
            display: inline-block;
            padding: 6px 14px;
            border-radius: 60px;
            font-size: 1.1rem;
            margin-top: 8px;
            color: #f5b042;
        }

        .vibe-bar {
            background: #222a33;
            height: 8px;
            border-radius: 20px;
            margin: 16px 10px 20px 10px;
            overflow: hidden;
        }

        .vibe-intensity {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #ff884d, #ff5500);
            border-radius: 20px;
            transition: width 0.05s linear;
            box-shadow: 0 0 6px #ffaa66;
        }

        .meta-panel {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            background: #0c111c80;
            border-radius: 60px;
            padding: 8px 16px;
            margin: 12px 0 18px;
            font-size: 0.8rem;
            font-weight: 500;
            color: #adccf0;
        }

        .button-group {
            display: flex;
            gap: 18px;
            justify-content: center;
            margin-top: 12px;
        }

        .btn {
            border: none;
            background: #212e3c;
            padding: 14px 20px;
            border-radius: 60px;
            font-weight: 700;
            font-size: 1rem;
            color: #eef5ff;
            flex: 1;
            text-align: center;
            cursor: pointer;
            transition: 0.1s linear;
            box-shadow: 0 4px 0 #0f141f;
            font-family: inherit;
        }

        .btn-primary {
            background: #2c6280;
            box-shadow: 0 4px 0 #1a3b4e;
        }

        .btn-primary:active {
            transform: translateY(2px);
            box-shadow: 0 1px 0 #1a3b4e;
        }

        .btn-danger {
            background: #5a3e2c;
            box-shadow: 0 4px 0 #3e2a1d;
        }

        .btn:active {
            transform: translateY(2px);
        }

        .cycle-counter {
            font-size: 0.85rem;
            background: #00000055;
            padding: 4px 12px;
            border-radius: 36px;
        }

        .audio-toggle {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 16px;
            background: #0c111c90;
            border-radius: 40px;
            padding: 6px 16px;
            width: fit-content;
            margin-left: auto;
            margin-right: auto;
            cursor: pointer;
            font-size: 0.8rem;
            color: #bbd4f0;
            transition: 0.1s;
        }

        .audio-toggle:active {
            background: #1f2c3e;
        }

        footer {
            text-align: center;
            font-size: 0.7rem;
            margin-top: 20px;
            color: #5a7794;
        }

        .buzzer-badge {
            background: #2c1e1a;
            padding: 3px 10px;
            border-radius: 40px;
            font-size: 0.7rem;
            display: inline-block;
            margin-top: 6px;
        }
    </style>
</head>
<body>
<div class="device">
    <div class="lcd">
        <div class="lcd-row lcd-main" id="lcdMainLine">FearLess</div>
        <div class="lcd-row lcd-sub" id="lcdSubLine">Ready | hold START</div>
        <div id="bpmIndicator" class="bpm-badge">❤️ BPM: --</div>
    </div>

    <div class="vibe-bar">
        <div class="vibe-intensity" id="vibeFill"></div>
    </div>

    <div class="meta-panel">
        <span>🌀 MODE: <strong id="currentModeName">CALM MODE</strong></span>
        <span class="cycle-counter" id="cycleStatus">⚡ Cycle --/3</span>
    </div>

    <div class="button-group">
        <button class="btn" id="modeBtn">🔘 MODE</button>
        <button class="btn btn-primary" id="startBtn">🌿 START (hold)</button>
        <button class="btn btn-danger" id="stopBtn">⏹️ STOP</button>
    </div>

    <div class="audio-toggle" id="audioToggleBtn">
        <span id="audioIcon">🔊</span> <span id="audioLabel">BUZZER SOUND ON</span>
    </div>
    <div class="buzzer-badge">🔊 Buzzer pattern: INHALE = short beep-buzz • EXHALE = gentle descending tone</div>
    <footer>⚡ Accurate biofeedback simulation • 3 cycles • Vibration + Sound</footer>
</div>

<script>
    // ---------------------- PROFESSIONAL BUZZER SOUND ENGINE ----------------------
    // No external files needed — pure Web Audio synthesis that mimics a piezo buzzer
    let audioCtx = null;
    let soundEnabled = true;
    
    // Initialize AudioContext on first user interaction (required by browsers)
    function initAudio() {
        if (audioCtx) return;
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    
    // Helper: ensure context is running
    async function ensureAudioRunning() {
        if (!audioCtx) initAudio();
        if (audioCtx && audioCtx.state === 'suspended') {
            await audioCtx.resume();
        }
        return audioCtx;
    }
    
    // ----- Realistic Buzzer "Bip Bip" sound (like a hardware buzzer / beeper) -----
    // produces a short, sharp, square-wave-ish buzz with harmonic content
    function playBuzzerBeep(durationMs = 120, frequency = 2800, intensity = 0.25) {
        if (!soundEnabled) return Promise.resolve();
        return new Promise(async (resolve) => {
            const ctx = await ensureAudioRunning();
            if (!ctx || !soundEnabled) { resolve(); return; }
            
            const now = ctx.currentTime;
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.connect(gain);
            gain.connect(ctx.destination);
            
            // Square wave gives that classic buzzer "bip" character
            osc.type = 'square';
            osc.frequency.value = frequency;
            
            // sharp attack, quick decay (buzzer click feel)
            gain.gain.setValueAtTime(intensity * 0.9, now);
            gain.gain.exponentialRampToValueAtTime(0.0001, now + (durationMs / 1000));
            
            // add slight harmonic edge: second oscillator for richer buzz (optional)
            const osc2 = ctx.createOscillator();
            const gain2 = ctx.createGain();
            osc2.type = 'sawtooth';
            osc2.frequency.value = frequency * 1.5;
            gain2.gain.value = intensity * 0.2;
            osc2.connect(gain2);
            gain2.connect(ctx.destination);
            gain2.gain.setValueAtTime(intensity * 0.2, now);
            gain2.gain.exponentialRampToValueAtTime(0.0001, now + (durationMs / 1000));
            
            osc.start();
            osc2.start();
            osc.stop(now + (durationMs / 1000));
            osc2.stop(now + (durationMs / 1000));
            
            // resolve after sound ends
            setTimeout(resolve, durationMs + 20);
        });
    }
    
    // Double beep pattern for inhale start (more noticeable)
    async function playInhaleBuzzer() {
        if (!soundEnabled) return;
        await playBuzzerBeep(90, 3200, 0.28);
        await new Promise(r => setTimeout(r, 40));
        await playBuzzerBeep(100, 2800, 0.3);
    }
    
    // Exhale: gentle descending sweep (soft buzzer-like, but calming)
    async function playExhaleSweep() {
        if (!soundEnabled) return;
        const ctx = await ensureAudioRunning();
        if (!ctx) return;
        const now = ctx.currentTime;
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.type = 'sine';   // softer for exhale but still audible
        osc.frequency.setValueAtTime(1100, now);
        osc.frequency.exponentialRampToValueAtTime(480, now + 0.85);
        gain.gain.setValueAtTime(0.2, now);
        gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.95);
        osc.start();
        osc.stop(now + 0.95);
    }
    
    // Hold phase: short subtle tick (optional, but gives feedback)
    async function playHoldTick() {
        if (!soundEnabled) return;
        const ctx = await ensureAudioRunning();
        if (!ctx) return;
        const now = ctx.currentTime;
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.type = 'triangle';
        osc.frequency.value = 1800;
        gain.gain.setValueAtTime(0.08, now);
        gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.08);
        osc.start();
        osc.stop(now + 0.08);
    }
    
    // measurement done sound: classic success bip-bip
    async function playMeasurementDoneSound() {
        if (!soundEnabled) return;
        await playBuzzerBeep(120, 2600, 0.25);
        await new Promise(r => setTimeout(r, 90));
        await playBuzzerBeep(140, 3200, 0.28);
    }
    
    // session end: 3 rising beeps
    async function playSessionEndMelody() {
        if (!soundEnabled) return;
        await playBuzzerBeep(180, 2000, 0.22);
        await new Promise(r => setTimeout(r, 150));
        await playBuzzerBeep(180, 2600, 0.25);
        await new Promise(r => setTimeout(r, 180));
        await playBuzzerBeep(220, 3300, 0.28);
    }
    
    // Mode switch short beep
    async function playModeSwitchBeep() {
        if (!soundEnabled) return;
        await playBuzzerBeep(60, 2400, 0.2);
    }
    
    // ---------------------- SOFTWARE BIOFEEDBACK ENGINE -------------------------
    const modes = [
        { name: "CALM MODE",    inhale: 5, hold: 5, exhale: 7 },
        { name: "FOCUS MODE",   inhale: 5, hold: 4, exhale: 6 },
        { name: "ADRENALINE",   inhale: 3, hold: 2, exhale: 4 }
    ];
    
    let currentModeIndex = 0;
    let sessionActive = false;
    let currentCycle = 1;
    let stepTimer = null;
    let cancelRequest = false;
    let measuredBPM = 72;
    
    // UI elements
    const lcdMain = document.getElementById('lcdMainLine');
    const lcdSub = document.getElementById('lcdSubLine');
    const bpmSpan = document.getElementById('bpmIndicator');
    const currentModeSpan = document.getElementById('currentModeName');
    const cycleStatusSpan = document.getElementById('cycleStatus');
    const vibeFill = document.getElementById('vibeFill');
    const modeBtn = document.getElementById('modeBtn');
    const startBtn = document.getElementById('startBtn');
    const stopBtn = document.getElementById('stopBtn');
    const audioToggleBtn = document.getElementById('audioToggleBtn');
    const audioIcon = document.getElementById('audioIcon');
    const audioLabel = document.getElementById('audioLabel');
    
    // Audio toggle
    audioToggleBtn.addEventListener('click', async () => {
        soundEnabled = !soundEnabled;
        if (soundEnabled) {
            audioIcon.innerText = '🔊';
            audioLabel.innerText = 'BUZZER SOUND ON';
            // test beep to confirm
            await ensureAudioRunning();
            playBuzzerBeep(80, 2700, 0.2);
        } else {
            audioIcon.innerText = '🔇';
            audioLabel.innerText = 'SOUND OFF';
        }
    });
    
    function updateModeUI() {
        currentModeSpan.innerText = modes[currentModeIndex].name;
        if (!sessionActive) {
            lcdMain.innerText = modes[currentModeIndex].name.split(' ')[0];
            lcdSub.innerText = "Hold START (1s)";
        }
    }
    
    function showHome() {
        if (sessionActive) return;
        lcdMain.innerText = "FearLess";
        lcdSub.innerText = "✔ hold START • Buzzer ready";
        updateModeUI();
        bpmSpan.innerHTML = measuredBPM ? `❤️ BPM: ${measuredBPM}` : `❤️ BPM: --`;
        cycleStatusSpan.innerText = `⚡ Cycle --/3`;
        vibeFill.style.width = "0%";
    }
    
    function setHapticIntensity(phase, progressPercent = null) {
        if (phase === 'inhale') {
            vibeFill.style.width = "100%";
            vibeFill.style.background = "linear-gradient(90deg, #ffaa55, #ff5500)";
        } else if (phase === 'exhale') {
            vibeFill.style.width = "35%";
            vibeFill.style.background = "linear-gradient(90deg, #55cc99, #228866)";
        } else if (phase === 'hold') {
            vibeFill.style.width = "6%";
            vibeFill.style.background = "#557a6e";
        } else {
            vibeFill.style.width = "0%";
        }
        if (progressPercent !== undefined && phase !== 'hold') {
            if (phase === 'inhale') {
                let w = 20 + (progressPercent * 80);
                vibeFill.style.width = Math.min(100, w) + "%";
            } else if (phase === 'exhale') {
                let w = 50 - (progressPercent * 40);
                vibeFill.style.width = Math.max(5, w) + "%";
            }
        }
    }
    
    function updateBreathingDisplay(phase, secondsLeft, totalSec, cycleNum) {
        let phaseUpper = phase.toUpperCase();
        let barLength = Math.floor((secondsLeft / totalSec) * 16);
        let barGraph = "|" + "█".repeat(Math.min(16, Math.max(0, barLength))) + "░".repeat(Math.max(0, 16 - barLength)) + "|";
        lcdMain.innerText = `${phaseUpper}... ${secondsLeft}s`;
        lcdSub.innerText = barGraph + `  🌀${cycleNum}/3`;
        cycleStatusSpan.innerText = `🌀 Cycle ${cycleNum}/3`;
        let progress = (totalSec - secondsLeft) / totalSec;
        if (phase === 'inhale') {
            setHapticIntensity('inhale', progress);
        } else if (phase === 'exhale') {
            setHapticIntensity('exhale', progress);
        } else {
            setHapticIntensity('hold');
        }
    }
    
    async function simulateHeartRateMeasurement() {
        return new Promise((resolve) => {
            lcdMain.innerText = "📈 MEASURING";
            lcdSub.innerText = "Place finger on sensor...";
            bpmSpan.innerHTML = `🔴 BPM: reading..`;
            vibeFill.style.width = "0%";
            let count = 0;
            const interval = setInterval(() => {
                count++;
                let fakeBPM = Math.floor(Math.random() * (98 - 62 + 1) + 62);
                bpmSpan.innerHTML = `💓 BPM: ${fakeBPM}*`;
                if (count >= 6) {
                    clearInterval(interval);
                    let finalBPM = Math.floor(Math.random() * (98 - 62 + 1) + 62);
                    measuredBPM = finalBPM;
                    bpmSpan.innerHTML = `❤️ BPM: ${finalBPM}`;
                    lcdMain.innerText = `Start BPM: ${finalBPM}`;
                    lcdSub.innerText = "✓ ready • starting...";
                    playMeasurementDoneSound();
                    setTimeout(() => resolve(finalBPM), 800);
                }
            }, 1000);
        });
    }
    
    function stopBreathingTimers() {
        if (stepTimer) { clearInterval(stepTimer); stepTimer = null; }
    }
    
    function emergencyStop() {
        if (!sessionActive) return;
        cancelRequest = true;
        sessionActive = false;
        stopBreathingTimers();
        vibeFill.style.width = "0%";
        lcdMain.innerText = "⏹️ STOPPED";
        lcdSub.innerText = "Session interrupted";
        setTimeout(() => { if (!sessionActive) showHome(); }, 1400);
        setTimeout(() => { cancelRequest = false; }, 200);
    }
    
    function runPhase(phaseName, durationSeconds, cycleNum) {
        return new Promise(async (resolve, reject) => {
            if (cancelRequest || !sessionActive) return reject(new Error("cancelled"));
            if (durationSeconds <= 0) return resolve();
            let remaining = durationSeconds;
            
            // Play appropriate buzzer sound at phase start (accurate bip-bip)
            if (phaseName === 'inhale') {
                await playInhaleBuzzer();  // double bip for inhale start
            } else if (phaseName === 'exhale') {
                await playExhaleSweep();
            } else if (phaseName === 'hold') {
                await playHoldTick(); // subtle tick at hold begin
            }
            
            const updateInterval = () => {
                if (cancelRequest || !sessionActive) {
                    reject(new Error("cancelled"));
                    return;
                }
                updateBreathingDisplay(phaseName, remaining, durationSeconds, cycleNum);
                remaining--;
                if (remaining < 0) {
                    clearInterval(timerId);
                    resolve();
                }
            };
            updateInterval();
            const timerId = setInterval(updateInterval, 1000);
            stepTimer = timerId;
        });
    }
    
    async function runSingleCycle(modeIdx, cycleNumber) {
        if (cancelRequest || !sessionActive) return false;
        const mode = modes[modeIdx];
        await runPhase('inhale', mode.inhale, cycleNumber);
        if (cancelRequest || !sessionActive) return false;
        await runPhase('hold', mode.hold, cycleNumber);
        if (cancelRequest || !sessionActive) return false;
        await runPhase('exhale', mode.exhale, cycleNumber);
        if (cancelRequest || !sessionActive) return false;
        return true;
    }
    
    async function startFullSession() {
        if (sessionActive) return;
        // ensure audio ready
        await ensureAudioRunning();
        
        sessionActive = true;
        cancelRequest = false;
        currentCycle = 1;
        
        await simulateHeartRateMeasurement();
        if (cancelRequest || !sessionActive) {
            if(!sessionActive) showHome();
            return;
        }
        
        lcdMain.innerText = `Start BPM: ${measuredBPM}`;
        lcdSub.innerText = "Guided breathing start";
        bpmSpan.innerHTML = `❤️ BPM: ${measuredBPM}`;
        await new Promise(r => setTimeout(r, 1300));
        
        for (let cycle = 1; cycle <= 3; cycle++) {
            if (cancelRequest || !sessionActive) break;
            currentCycle = cycle;
            cycleStatusSpan.innerText = `🌀 Cycle ${cycle}/3`;
            lcdMain.innerText = `Cycle ${cycle} / 3`;
            lcdSub.innerText = modes[currentModeIndex].name;
            await new Promise(r => setTimeout(r, 1000));
            if (cancelRequest || !sessionActive) break;
            
            const success = await runSingleCycle(currentModeIndex, cycle);
            if (!success) break;
            
            if (cycle < 3 && !cancelRequest && sessionActive) {
                lcdMain.innerText = "✨ relax...";
                lcdSub.innerText = "next cycle soon";
                await new Promise(r => setTimeout(r, 1200));
            }
        }
        
        if (sessionActive && !cancelRequest) {
            lcdMain.innerText = "✅ SESSION ENDED";
            lcdSub.innerText = "THANK YOU! 🧘";
            cycleStatusSpan.innerText = `🏁 Completed`;
            vibeFill.style.width = "0%";
            let stressReduction = Math.floor(Math.random() * 15) + 8;
            bpmSpan.innerHTML = `🧘 BPM: ${measuredBPM} → ${Math.max(55, measuredBPM - stressReduction)}* relaxed`;
            await playSessionEndMelody();
            await new Promise(r => setTimeout(r, 3800));
            if (sessionActive) {
                sessionActive = false;
                showHome();
            }
        } else {
            if (cancelRequest) {
                sessionActive = false;
                showHome();
            }
        }
        sessionActive = false;
        stopBreathingTimers();
        if(!cancelRequest) showHome();
        else showHome();
        cancelRequest = false;
    }
    
    // Button handlers with long-press detection (1 sec = start)
    let startPressTimer = null;
    let isLongPressTriggered = false;
    
    function onStartPressDown() {
        if (sessionActive) return;
        if (startPressTimer) clearTimeout(startPressTimer);
        startPressTimer = setTimeout(async () => {
            if (!sessionActive && !isLongPressTriggered) {
                isLongPressTriggered = true;
                await startFullSession();
                isLongPressTriggered = false;
                startPressTimer = null;
            }
        }, 1000);
    }
    
    function onStartPressUp() {
        if (startPressTimer) {
            clearTimeout(startPressTimer);
            startPressTimer = null;
        }
        isLongPressTriggered = false;
    }
    
    async function cycleMode() {
        if (sessionActive) {
            lcdSub.innerText = "Stop session first!";
            setTimeout(() => { if (!sessionActive) showHome(); else lcdSub.innerText = "Session in progress"; }, 1000);
            return;
        }
        currentModeIndex = (currentModeIndex + 1) % modes.length;
        updateModeUI();
        lcdMain.innerText = modes[currentModeIndex].name;
        lcdSub.innerText = "Mode set • hold START";
        vibeFill.style.width = "40%";
        setTimeout(() => { if(!sessionActive) vibeFill.style.width = "0%"; }, 300);
        await playModeSwitchBeep();
    }
    
    function stopSession() {
        if (sessionActive) {
            emergencyStop();
        } else {
            lcdMain.innerText = "System ready";
            lcdSub.innerText = "Select mode & hold start";
            vibeFill.style.width = "0%";
            setTimeout(() => showHome(), 1200);
        }
    }
    
    // Event binding
    startBtn.addEventListener('mousedown', onStartPressDown);
    startBtn.addEventListener('mouseup', onStartPressUp);
    startBtn.addEventListener('touchstart', (e) => { e.preventDefault(); onStartPressDown(); });
    startBtn.addEventListener('touchend', (e) => { e.preventDefault(); onStartPressUp(); });
    modeBtn.addEventListener('click', cycleMode);
    stopBtn.addEventListener('click', stopSession);
    
    // Unlock audio on any user gesture (browser autoplay policy)
    const unlockAudioOnUserGesture = async () => {
        await ensureAudioRunning();
        document.body.removeEventListener('click', unlockAudioOnUserGesture);
        document.body.removeEventListener('touchstart', unlockAudioOnUserGesture);
    };
    document.body.addEventListener('click', unlockAudioOnUserGesture);
    document.body.addEventListener('touchstart', unlockAudioOnUserGesture);
    
    // Initialization
    initAudio();
    showHome();
    measuredBPM = 72;
    bpmSpan.innerHTML = `❤️ BPM: --`;
</script>
</body>
  </html>
